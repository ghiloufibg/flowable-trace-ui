server:
  port: 8080

spring:
  application:
    name: e2e-fixture
  # DB_CLOSE_DELAY=-1 keeps the in-memory DB alive for the app's whole lifetime, independent of
  # HikariCP's pool momentarily draining to zero connections.
  datasource:
    url: jdbc:h2:mem:e2e-fixture;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

flowable:
  # BPMN under classpath:/processes/ auto-deploys with no further config (Flowable's own default);
  # explicit here only for the one setting the seed data actually depends on.
  async-executor-activate: true

flowtrace:
  default-page-size: 1000

logging:
  level:
    org.flowable: WARN
